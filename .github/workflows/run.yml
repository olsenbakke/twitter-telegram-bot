name: Twitter Telegram Bot Runner

on:
  schedule:
    - cron: '*/10 * * * *'  # Run every 10 minutes (144 times a day, 100% free)
  workflow_dispatch:      # Allows manual trigger from GitHub Web UI

permissions:
  contents: write         # Allows GitHub Actions to push database updates back to your repository

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests python-dotenv

      - name: Run Twitter Telegram Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          TRANSLATE_FA: ${{ secrets.TRANSLATE_FA }}
          AEROLINK_API_KEY: ${{ secrets.AEROLINK_API_KEY }}
          AEROLINK_BASE_URL: ${{ secrets.AEROLINK_BASE_URL }}
          AEROLINK_MODEL: ${{ secrets.AEROLINK_MODEL }}
        run: python run_github_bot.py

      - name: Commit and Push Database Updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tracked_users.json sent_ids.json filters.json tg_offset.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update database [skip ci]" && git push)
